name: Sync Amazon Products

# ─── Cuándo se ejecuta ────────────────────────────────────────────────────────
#
#  • Solo manual (workflow_dispatch). El cron diario está desactivado hasta que
#    existan secrets PA-API en GitHub; si no, cada ejecución fallaba y enviaba correos.
#  • Para reactivar el sync automático, descomenta el bloque schedule:
#      schedule:
#        - cron: "0 5 * * *"   # 05:00 UTC ≈ 07:00 España (verano)
#
on:
  workflow_dispatch:

# ─── Permisos necesarios para hacer push del products.json actualizado ────────
permissions:
  contents: write

jobs:
  sync:
    name: Fetch products from PA-API & commit catalog
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configura Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3. Ejecuta el script de sync
      #    Las credenciales vienen de los Secrets del repositorio en GitHub
      - name: Run PA-API sync
        env:
          PAAPI_ACCESS_KEY: ${{ secrets.PAAPI_ACCESS_KEY }}
          PAAPI_SECRET_KEY: ${{ secrets.PAAPI_SECRET_KEY }}
          NEXT_PUBLIC_AMAZON_TAG_ES: ${{ secrets.NEXT_PUBLIC_AMAZON_TAG_ES }}
        run: node scripts/sync-paapi.mjs

      # 4. Comprueba si hay cambios en products.json
      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/products.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      # 5. Si hay cambios, hace commit → Vercel se redespliega automáticamente
      - name: Commit updated catalog
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/products.json
          git commit -m "chore: sync Amazon catalog $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: No changes detected
        if: steps.changes.outputs.changed != 'true'
        run: echo "products.json sin cambios — no se hace commit."
